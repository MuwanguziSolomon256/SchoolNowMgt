services:
  - type: web
    name: school-mgmt
    env: python
    buildCommand: |
      echo "Installing dependencies..."
      pip install -r requirements.txt
      echo "Collecting static files..."
      python manage.py collectstatic --noinput --clear --verbosity 2
      echo "Verifying static files..."
      if [ -d staticfiles ]; then echo "✓ Static files directory created successfully"; ls staticfiles/ | head -5; else echo "✗ Warning: staticfiles directory not found"; fi
    startCommand: |
      echo "=== Starting Django application ==="
      echo "Step 1: Running database migrations..."
      python manage.py migrate --no-input || { echo "❌ Migrations failed!"; exit 1; }
      echo "✓ Migrations complete"
      
      echo "Step 2: Ensuring default school exists..."
      python manage.py ensure_default_school || echo "⚠ Warning: Could not create default school, but continuing..."
      echo "✓ School initialization complete"
      
      echo "Step 3: Loading initial data..."
      python manage.py loaddata data.json 2>/dev/null || echo "ℹ Note: No data.json to load or already loaded"
      echo "✓ Data loading complete"
      
      echo "Step 4: Starting Gunicorn server..."
      exec gunicorn schoolmgmt_project.wsgi:application \
        --workers 1 \
        --worker-class sync \
        --bind 0.0.0.0:10000 \
        --timeout 120 \
        --access-logfile - \
        --error-logfile - \
        --log-level info
    envVars:
      - key: PORT
        value: "10000"
      - key: DJANGO_SETTINGS_MODULE
        value: schoolmgmt_project.settings.prod
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: schoolnowmgt.onrender.com,www.schoolnowmgt.onrender.com
      - key: AT_USERNAME
        sync: false
      - key: AT_API_KEY
        sync: false
      - key: AT_SANDBOX
        value: "False"
      - key: DB_NAME
        fromDatabase:
          name: school-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: school-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: school-db
          property: password
      - key: DB_HOST
        fromDatabase:
          name: school-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: school-db
          property: port

databases:
  - name: school-db
    databaseName: school_db
    user: school_user
    plan: free
