<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirm Logout - School Management System</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', Arial, sans-serif;
            font-size: 16px;
            line-height: 1.5;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .modal-container {
            background: white;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            padding: 2rem;
            text-align: center;
        }
        
        .modal-header {
            margin-bottom: 1.5rem;
        }
        
        .modal-header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #dc3545;
            margin-bottom: 0.5rem;
        }
        
        .modal-body {
            margin-bottom: 2rem;
        }
        
        .modal-body p {
            font-size: 0.95rem;
            color: #666;
            line-height: 1.6;
        }
        
        .modal-footer {
            display: flex;
            gap: 1rem;
            flex-direction: column;
        }
        
        form {
            margin: 0;
        }
        
        button[type="submit"],
        .btn {
            padding: 0.75rem 1rem;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: background-color 0.3s ease, transform 0.2s ease;
            width: 100%;
        }
        
        button[type="submit"] {
            background-color: #dc3545;
            color: white;
        }
        
        button[type="submit"]:hover {
            background-color: #c82333;
            transform: translateY(-1px);
        }
        
        .btn-cancel {
            background-color: #e9ecef;
            color: #333;
            border: 1px solid #dee2e6;
        }
        
        .btn-cancel:hover {
            background-color: #dee2e6;
        }
        
        @media (max-width: 480px) {
            .modal-container {
                margin: 1rem;
                padding: 1.5rem;
            }
            
            .modal-header h1 {
                font-size: 1.25rem;
            }
        }
    </style>
</head>
<body>
    <div class="modal-container">
        <div class="modal-header">
            <h1>Confirm Logout</h1>
        </div>
        
        <div class="modal-body">
            <p>Are you sure you want to log out? You will need to log in again to access the dashboard.</p>
        </div>
        
        <div class="modal-footer">
            <form method="post">
                {% csrf_token %}
                <button type="submit">Yes, Log Out</button>
            </form>
            <a href="/school/" class="btn btn-cancel">Cancel</a>
        </div>
    </div>
</body>
</html>
