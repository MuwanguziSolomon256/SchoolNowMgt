<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logged Out - School Management System</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', Arial, sans-serif;
            font-size: 16px;
            line-height: 1.5;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .logout-container {
            background: white;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            padding: 2rem;
            text-align: center;
        }
        
        .logout-header {
            margin-bottom: 1.5rem;
        }
        
        .logout-header h1 {
            font-size: 1.75rem;
            font-weight: 600;
            color: #28a745;
            margin-bottom: 0.5rem;
        }
        
        .logout-header p {
            font-size: 1rem;
            color: #666;
            margin-bottom: 1rem;
        }
        
        .logout-message {
            background-color: #d4edda;
            border: 1px solid #28a745;
            border-radius: 4px;
            padding: 1rem;
            color: #155724;
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
            line-height: 1.6;
        }
        
        .logout-footer {
            display: flex;
            gap: 1rem;
            flex-direction: column;
        }
        
        .btn {
            padding: 0.75rem 1rem;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }
        
        .btn-primary {
            background-color: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background-color: #5568d3;
            transform: translateY(-1px);
        }
        
        .btn-secondary {
            background-color: #e9ecef;
            color: #333;
            border: 1px solid #dee2e6;
        }
        
        .btn-secondary:hover {
            background-color: #dee2e6;
        }
        
        @media (max-width: 480px) {
            .logout-container {
                margin: 1rem;
                padding: 1.5rem;
            }
            
            .logout-header h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="logout-container">
        <div class="logout-header">
            <h1>Logged Out</h1>
            <p>You have been successfully logged out.</p>
        </div>
        
        <div class="logout-message">
            <p>Your session has ended. For security reasons, please close your browser if you're using a shared computer.</p>
        </div>
        
        <div class="logout-footer">
            <a href="/accounts/login/" class="btn btn-primary">Sign In Again</a>
            <a href="/" class="btn btn-secondary">Go to Home</a>
        </div>
    </div>
</body>
</html>
