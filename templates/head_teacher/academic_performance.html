<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Performance - Head Teacher</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>
<body class="bg-gray-50">
    <div class="max-w-7xl mx-auto px-4 py-8">
        <div class="mb-8">
            <a href="{% url 'teacher:head_teacher:dashboard' %}" class="text-blue-600 hover:text-blue-900 flex items-center gap-2 mb-4">
                <span class="material-symbols-rounded">arrow_back</span>
                Back to Dashboard
            </a>
            <h1 class="text-3xl font-bold text-gray-900">Academic Performance</h1>
            <p class="text-gray-600 mt-2">Overall school academic performance metrics</p>
        </div>

        <!-- Class Performance -->
        <div class="bg-white rounded-lg shadow p-6">
            <h2 class="text-xl font-bold text-gray-900 mb-4">Class Statistics</h2>
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-4 py-2 text-left font-semibold text-gray-900">Class</th>
                            <th class="px-4 py-2 text-left font-semibold text-gray-900">Students</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for stat in class_statistics %}
                        <tr class="border-b">
                            <td class="px-4 py-2 text-gray-900">{{ stat.class.class_name }}</td>
                            <td class="px-4 py-2 text-gray-600">{{ stat.students }}</td>
                        </tr>
                        {% empty %}
                        <tr>
                            <td colspan="2" class="px-4 py-2 text-center text-gray-500">No data available</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
