<!-- Parent Dashboard Top Blue Bar - Mobile Responsive -->
<!-- This bar appears only on mobile devices (hidden on desktop lg+) -->
<!-- Includes: Logo, School Name, Mobile Menu Toggle, Notifications, Settings, Logout -->

<nav class="md:hidden fixed top-0 left-0 right-0 bg-primary text-on-primary px-4 py-3 flex items-center justify-between z-50 shadow-lg gap-2">
    <!-- Left Section: Logo + School Name -->
    <div class="flex items-center gap-2 flex-shrink-0">
        <div class="w-8 h-8 rounded-lg bg-secondary-container flex items-center justify-center text-primary flex-shrink-0">
            <span class="material-symbols-outlined text-lg" style="font-variation-settings: 'FILL' 1;">school</span>
        </div>
        <h1 class="text-sm font-black text-secondary-fixed">Legacy Academy</h1>
    </div>
    
    <!-- Right Side Actions -->
    <div class="flex items-center gap-1 flex-shrink-0">
        <!-- Notifications Icon -->
        <button class="text-on-primary/70 hover:text-white px-2 py-2 flex items-center hover:bg-white/10 transition-all rounded-lg">
            <span class="material-symbols-outlined text-base">notifications</span>
        </button>
        
        <!-- Settings Icon - Opens Profile Edit -->
        <a href="{% url 'user_profile:edit_profile' %}" class="text-on-primary/70 hover:text-white px-2 py-2 flex items-center hover:bg-white/10 transition-all rounded-lg">
            <span class="material-symbols-outlined text-base">settings</span>
        </a>
        
        <!-- Logout -->
        <a href="{% url 'SchoolNowMgt:custom_logout' %}" class="text-on-primary/70 hover:text-white px-2 py-2 flex items-center hover:bg-white/10 transition-all rounded-lg font-bold text-sm">
            <span class="material-symbols-outlined text-base">logout</span>
        </a>
    </div>
</nav>

<!-- Mobile Sidebar Overlay (to darken background when sidebar is open) -->
<div id="sidebarOverlay" class="fixed inset-0 bg-black/50 z-30 hidden md:hidden"></div>
