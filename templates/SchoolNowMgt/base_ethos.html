<!DOCTYPE html>
{% load static %}
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>{% block title %}EduVision Pro - Dashboard{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Hanken+Grotesk:wght@600;700;800;900&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="{% static 'css/ethos-glass-theme.css' %}" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "error-container": "#ffdad6",
                        "surface-dim": "#d9dadd",
                        "on-primary-fixed": "#121643",
                        "on-primary-container": "#868abd",
                        "surface-container-highest": "#e1e2e5",
                        "tertiary": "#2b0400",
                        "outline-variant": "#c7c5d0",
                        "primary-fixed-dim": "#bfc2fa",
                        "on-secondary": "#ffffff",
                        "on-primary-fixed-variant": "#3f4371",
                        "secondary-container": "#feb700",
                        "inverse-primary": "#bfc2fa",
                        "secondary-fixed-dim": "#ffba20",
                        "on-error": "#ffffff",
                        "on-background": "#191c1e",
                        "inverse-on-surface": "#f0f1f4",
                        "surface-bright": "#f8f9fc",
                        "surface": "#f8f9fc",
                        "surface-container-lowest": "#ffffff",
                        "on-surface-variant": "#46464f",
                        "on-secondary-fixed-variant": "#5e4200",
                        "outline": "#777680",
                        "primary-container": "#1e224f",
                        "error": "#ba1a1a",
                        "background": "#f8f9fc",
                        "surface-container-low": "#f2f3f6",
                        "on-secondary-fixed": "#271900",
                        "tertiary-fixed-dim": "#ffb4a2",
                        "on-tertiary-fixed-variant": "#881f01",
                        "on-primary": "#ffffff",
                        "secondary-fixed": "#ffdea8",
                        "surface-tint": "#565a8b",
                        "on-surface": "#191c1e",
                        "on-tertiary-container": "#e96442",
                        "surface-container": "#edeef1",
                        "on-secondary-container": "#6b4b00",
                        "primary": "#080b3a",
                        "tertiary-container": "#500d00",
                        "secondary": "#7c5800",
                        "on-error-container": "#93000a",
                        "surface-variant": "#e1e2e5",
                        "on-tertiary": "#ffffff",
                        "inverse-surface": "#2e3133",
                        "surface-container-high": "#e7e8eb",
                        "on-tertiary-fixed": "#3c0800",
                        "primary-fixed": "#e0e0ff",
                        "tertiary-fixed": "#ffdbd2"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "16px",
                        "card-gap": "12px",
                        "base": "8px",
                        "section-margin": "32px",
                        "container-padding": "20px"
                    },
                    "fontFamily": {
                        "label-md": ["Inter"],
                        "body-lg": ["Inter"],
                        "headline-md": ["Hanken Grotesk"],
                        "headline-lg": ["Hanken Grotesk"],
                        "display-lg": ["Hanken Grotesk"],
                        "body-md": ["Inter"],
                        "headline-lg-mobile": ["Hanken Grotesk"]
                    },
                    "fontSize": {
                        "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "headline-md": ["22px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "headline-lg": ["28px", {"lineHeight": "36px", "fontWeight": "600"}],
                        "display-lg": ["36px", {"lineHeight": "44px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "600"}]
                    }
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.8);
            border-left: 1px solid rgba(255, 255, 255, 0.8);
        }
        .sidebar-gradient {
            background: linear-gradient(180deg, #080b3a 0%, #1e224f 100%);
        }
        
        /* Mobile Optimizations */
        @media (max-width: 640px) {
            .glass-card {
                border-radius: 16px !important;
                padding: 16px !important;
            }
            
            /* Responsive tables on mobile */
            table {
                font-size: 12px;
            }
            
            th, td {
                padding: 8px 4px !important;
            }
            
            /* Hide certain columns on mobile */
            .hidden-mobile {
                display: none;
            }
            
            /* Responsive chart containers */
            canvas {
                max-width: 100%;
            }
            
            /* Touch-friendly buttons */
            button, a {
                min-height: 44px;
                min-width: 44px;
                padding: 10px !important;
            }
            
            /* Responsive stat cards */
            .glass-card p {
                font-size: clamp(20px, 4vw, 24px);
            }
            
            /* Flexible grid */
            .grid-cols-1 {
                grid-template-columns: 1fr;
            }
        }
        
        @media (max-width: 768px) {
            /* Tablet optimizations */
            .glass-card {
                border-radius: 20px !important;
            }
            
            /* Stack filter forms vertically */
            .filter-form {
                flex-direction: column;
            }
            
            .filter-form > div {
                width: 100%;
            }
        }
        
        /* Improve readability on all screens */
        @media (min-width: 640px) {
            .glass-card {
                transition: transform 0.2s, box-shadow 0.2s;
            }
            
            .glass-card:hover {
                transform: translateY(-2px);
                box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            }
        }
        
        /* Smooth animations */
        * {
            transition: background-color 0.2s ease;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body class="bg-background text-on-background font-body-md min-h-screen">

{% block content %}{% endblock %}

<script>
    document.querySelectorAll('.glass-card').forEach(card => {
        card.addEventListener('mousedown', () => {
            card.classList.add('scale-[0.98]', 'shadow-none');
        });
        card.addEventListener('mouseup', () => {
            card.classList.remove('scale-[0.98]', 'shadow-none');
        });
        card.addEventListener('mouseleave', () => {
            card.classList.remove('scale-[0.98]', 'shadow-none');
        });
    });
</script>

{% block extra_js %}{% endblock %}

</body>
</html>
