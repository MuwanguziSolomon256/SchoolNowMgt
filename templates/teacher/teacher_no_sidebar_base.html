<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>EduVision - Teacher Dashboard</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Hanken+Grotesk:wght@600;700;900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "error-container": "#ffdad6",
                        "surface-dim": "#d9dadd",
                        "on-primary-fixed": "#121643",
                        "on-primary-container": "#868abd",
                        "surface-container-highest": "#e1e2e5",
                        "tertiary": "#2b0400",
                        "outline-variant": "#c7c5d0",
                        "primary-fixed-dim": "#bfc2fa",
                        "on-secondary": "#ffffff",
                        "on-primary-fixed-variant": "#3f4371",
                        "secondary-container": "#feb700",
                        "inverse-primary": "#bfc2fa",
                        "secondary-fixed-dim": "#ffba20",
                        "on-error": "#ffffff",
                        "on-background": "#191c1e",
                        "inverse-on-surface": "#f0f1f4",
                        "surface-bright": "#f8f9fc",
                        "surface": "#f8f9fc",
                        "surface-container-lowest": "#ffffff",
                        "on-surface-variant": "#46464f",
                        "on-secondary-fixed-variant": "#5e4200",
                        "outline": "#777680",
                        "primary-container": "#1e224f",
                        "error": "#ba1a1a",
                        "background": "#f8f9fc",
                        "surface-container-low": "#f2f3f6",
                        "on-secondary-fixed": "#271900",
                        "tertiary-fixed-dim": "#ffb4a2",
                        "on-tertiary-fixed-variant": "#881f01",
                        "on-primary": "#ffffff",
                        "secondary-fixed": "#ffdea8",
                        "surface-tint": "#565a8b",
                        "on-surface": "#191c1e",
                        "on-tertiary-container": "#e96442",
                        "surface-container": "#edeef1",
                        "on-secondary-container": "#6b4b00",
                        "primary": "#080b3a",
                        "tertiary-container": "#500d00",
                        "secondary": "#7c5800",
                        "on-error-container": "#93000a",
                        "surface-variant": "#e1e2e5",
                        "on-tertiary": "#ffffff",
                        "inverse-surface": "#2e3133",
                        "surface-container-high": "#e7e8eb",
                        "on-tertiary-fixed": "#3c0800",
                        "primary-fixed": "#e0e0ff",
                        "tertiary-fixed": "#ffdbd2"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "16px",
                        "card-gap": "12px",
                        "base": "8px",
                        "section-margin": "32px",
                        "container-padding": "20px"
                    },
                    "fontFamily": {
                        "label-md": ["Inter"],
                        "body-lg": ["Inter"],
                        "headline-md": ["Hanken Grotesk"],
                        "headline-lg": ["Hanken Grotesk"],
                        "display-lg": ["Hanken Grotesk"],
                        "body-md": ["Inter"],
                        "headline-lg-mobile": ["Hanken Grotesk"]
                    },
                    "fontSize": {
                        "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "headline-md": ["22px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "headline-lg": ["28px", {"lineHeight": "36px", "fontWeight": "600"}],
                        "display-lg": ["36px", {"lineHeight": "44px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "600"}]
                    }
                },
            },
        }
    </script>
    <style>
        .glass-card {
            background: #ffffff;
            backdrop-filter: blur(30px);
            border: 1.5px solid #e1e2e5;
            box-shadow: 0 16px 64px 0 rgba(30, 34, 79, 0.22), 0 0 1px rgba(30, 34, 79, 0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-card:hover {
            box-shadow: 0 20px 80px 0 rgba(30, 34, 79, 0.32), 0 0 2px rgba(30, 34, 79, 0.08);
            transform: translateY(-4px);
            background: #ffffff;
        }
        .sidebar-gradient {
            background: linear-gradient(180deg, #080b3a 0%, #1e224f 100%);
            box-shadow: 2px 0 20px rgba(0, 0, 0, 0.1);
        }
        .sun-gold-glow {
            box-shadow: 0 4px 16px rgba(254, 183, 0, 0.2);
            transition: all 0.3s ease;
        }
        .sun-gold-glow:hover {
            box-shadow: 0 12px 32px rgba(254, 183, 0, 0.5);
            transform: translateY(-2px);
        }
        .inner-stroke {
            border-top: 1px solid rgba(255, 255, 255, 0.6);
            border-left: 1px solid rgba(255, 255, 255, 0.6);
        }
        main {
            background: linear-gradient(135deg, #fafbfd 0%, #f5f6fa 50%, #fafbfd 100%);
            position: relative;
        }
        main::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 100%;
            background: radial-gradient(ellipse 200% 100% at 50% 0%, rgba(254, 183, 0, 0.04) 0%, transparent 40%),
                        radial-gradient(ellipse 100% 150% at 100% 50%, rgba(8, 11, 58, 0.02) 0%, transparent 50%);
            pointer-events: none;
            z-index: 1;
        }
        body {
            background-color: #f8f9fc;
            background-image: radial-gradient(at 0% 0%, rgba(254, 183, 0, 0.05) 0px, transparent 50%),
                              radial-gradient(at 100% 100%, rgba(8, 11, 58, 0.03) 0px, transparent 50%);
            overflow-x: hidden;
        }
        .glass-card:focus-within {
            box-shadow: 0 20px 80px 0 rgba(30, 34, 79, 0.3);
        }
        /* Enhanced header styling */
        header {
            background: linear-gradient(135deg, rgba(248, 249, 252, 0.98) 0%, rgba(245, 246, 250, 0.98) 100%) !important;
            box-shadow: 0 8px 32px rgba(30, 34, 79, 0.15), 0 1px 0 rgba(30, 34, 79, 0.05) !important;
            backdrop-filter: blur(12px) !important;
        }
        header button {
            color: #080b3a;
            opacity: 0.75;
            transition: all 0.2s ease;
        }
        header button:hover {
            opacity: 1;
            transform: scale(1.1);
        }
        /* Enhanced action card styling */
        a.glass-card {
            position: relative;
            overflow: hidden;
        }
        a.glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(254, 183, 0, 0.15), transparent);
            transition: left 0.5s ease;
            z-index: 1;
            pointer-events: none;
        }
        a.glass-card:hover::before {
            left: 100%;
        }
        /* Icon styling with enhanced effects */
        a.glass-card .material-symbols-outlined {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        a.glass-card:hover .material-symbols-outlined {
            transform: scale(1.2);
        }
        /* Enhanced section heading */
        .font-headline-lg-mobile, h2, h3, h4 {
            color: #0a0d3f;
            font-weight: 700;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.02);
        }
        /* Enhanced paragraph text */
        p, .font-body-lg, .font-body-md {
            color: #2d2d3d;
        }
        /* Enhanced label styling */
        .font-label-md {
            color: #1a1a2e;
            font-weight: 600;
        }
        /* Vivid button effects */
        button, a {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .bg-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(8, 11, 58, 0.25);
        }
    </style>
</head>
<body class="font-body-md text-on-surface min-h-screen">
    <!-- Main Canvas (NO SIDEBAR - Full Width) -->
    <main class="w-full min-h-screen">
        {% block content %}
        <!-- Content block to be overridden by child templates -->
        {% endblock %}
    </main>
</body>
</html>
