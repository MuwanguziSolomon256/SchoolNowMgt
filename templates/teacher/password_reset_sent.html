{% extends "teacher/base.html" %}

{% block title %}Email Sent{% endblock %}

{% block content %}
    <h1 class="card-heading">Check your email</h1>
    
    <div class="card-body-text">
        <p>If an account exists for that email address, you will receive a password reset link shortly.</p>
        <p>Check your spam folder if you do not see it.</p>
    </div>

    <div class="links">
        <a href="{% url 'teacher:login' %}">Back to sign in</a>
    </div>
{% endblock %}
